# promptiv.io — teaser site (Flask + SQLite + nginx)
# Replaces the prior coming-soon placeholder.
# Static assets in /srv/promptiv/public, API proxied to gunicorn on :8000.
#
# DEPLOY TARGET: /etc/nginx/sites-enabled/promptiv  (NOT sites-available/promptiv.io)

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name promptiv.io www.promptiv.io;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name promptiv.io www.promptiv.io;

    ssl_certificate     /etc/letsencrypt/live/promptiv.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/promptiv.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/promptiv.access.log;
    error_log  /var/log/nginx/promptiv.error.log warn;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    root /srv/promptiv/public;
    index index.html;
    server_tokens off;
    error_page 404 /404.html;

    # Flask API
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # Long cache for fonts + vendor (immutable)
    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    location /vendor/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Short cache for css/js (we may iterate)
    location ~* \.(css|js)$ {
        expires 5m;
        add_header Cache-Control "public";
    }

    # City hubs: serve /<city> straight from /<city>/index.html so the clean,
    # no-trailing-slash URL (which each hub's canonical points at) is served
    # directly instead of 301-redirecting to /<city>/. The exact-match clean
    # URLs below still win; paths with dots or slashes (assets, /api/) never
    # match this single-segment lowercase pattern, and a non-hub single segment
    # falls through to index.html.
    location ~ ^/([a-z][a-z-]*[a-z])$ {
        try_files /$1/index.html =404;
    }

    # Budget pages: /<city>/under-<n> served straight from its index.html (clean,
    # no trailing-slash redirect, matches the page's canonical). The numeric
    # "under-<n>" segment keeps this from matching /api/* or other two-part paths.
    location ~ ^/([a-z][a-z-]*[a-z])/(under-[0-9]+)$ {
        try_files /$1/$2/index.html =404;
    }

    # Comparison pages: /vs/<cheap>-vs-<anchor> served clean, real 404 if absent.
    location ~ ^/vs/([a-z0-9-]+)$ {
        try_files /vs/$1/index.html =404;
    }

    # Clean URLs
    location = /privacy { try_files /privacy.html =404; }
    location = /terms   { try_files /terms.html =404; }
    location = /thanks  { try_files /thanks.html =404; }
    location = /go      { try_files /go.html =404; }

    # Flask-handled page (exact match beats the city-hub regex below, which would
    # otherwise swallow /unsubscribe as a "city" and serve index.html).
    location = /unsubscribe {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # Fallback — serve the file/dir if it exists, else a real 404 (-> /404.html).
    # The homepage at "/" still resolves via the index directive ($uri/).
    location / {
        try_files $uri $uri/ =404;
    }

    # Deny dotfiles
    location ~ /\. { deny all; }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
