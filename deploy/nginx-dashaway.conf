# /etc/nginx/sites-enabled/dashaway
# Two products on one droplet:
#   dashaway.io  -> the trip-discovery product (/srv/promptiv/public)
#   promptiv.io  -> a "Promptiv coming soon" placeholder (/srv/promptiv-comingsoon)

# ---- dashaway.io : the product ----
server {
    listen 80;
    listen [::]:80;
    server_name dashaway.io www.dashaway.io;
    return 301 https://dashaway.io$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dashaway.io www.dashaway.io;

    ssl_certificate     /etc/letsencrypt/live/dashaway.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashaway.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/dashaway.access.log;
    error_log  /var/log/nginx/dashaway.error.log warn;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    root /srv/promptiv/public;
    index index.html;
    server_tokens off;
    error_page 404 /404.html;

    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    location /fonts/  { expires 1y; add_header Cache-Control "public, immutable"; access_log off; }
    location /vendor/ { expires 1y; add_header Cache-Control "public, immutable"; access_log off; }
    location ~* \.(css|js)$ { expires 5m; add_header Cache-Control "public"; }

    # City hubs: /<city> served clean (no trailing-slash redirect).
    location ~ ^/([a-z][a-z-]*[a-z])$ {
        try_files /$1/index.html =404;
    }
    # Budget pages: /<city>/under-<n>
    location ~ ^/([a-z][a-z-]*[a-z])/(under-[0-9]+)$ {
        try_files /$1/$2/index.html =404;
    }
    # Comparison pages: /vs/<slug>
    location ~ ^/vs/([a-z0-9-]+)$ {
        try_files /vs/$1/index.html =404;
    }
    # Blog posts: /blog/<slug>
    location ~ ^/blog/([a-z0-9-]+)$ {
        try_files /blog/$1/index.html =404;
    }

    location = /privacy { try_files /privacy.html =404; }
    location = /terms   { try_files /terms.html =404; }
    location = /thanks  { try_files /thanks.html =404; }
    location = /go      { try_files /go.html =404; }

    location = /unsubscribe {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    location / { try_files $uri $uri/ =404; }
    location ~ /\. { deny all; }
    location = /favicon.ico { log_not_found off; access_log off; }
}

# ---- promptiv.io : "Promptiv — coming soon" placeholder ----
server {
    listen 80;
    listen [::]:80;
    server_name promptiv.io www.promptiv.io;
    return 301 https://promptiv.io$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name promptiv.io www.promptiv.io;

    ssl_certificate     /etc/letsencrypt/live/promptiv.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/promptiv.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    server_tokens off;

    root /srv/promptiv-comingsoon;
    index index.html;

    location / { try_files /index.html =404; }
}
