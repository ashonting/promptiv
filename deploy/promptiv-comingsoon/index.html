<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Promptiv — coming soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='%238b5cf6'/%3E%3C/svg%3E" type="image/svg+xml" />
  <style>
    :root {
      --bg: #ffffff; --ink: #1a1924; --muted: #6e6c7a; --accent: #8b5cf6;
      --serif: 'Instrument Serif', Georgia, serif;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg); color: var(--ink); font-family: var(--sans);
      -webkit-font-smoothing: antialiased; min-height: 100vh; position: relative; overflow: hidden;
    }
    .aurora {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(circle at 20% 25%, rgba(139,92,246,0.10) 0%, transparent 40%),
        radial-gradient(circle at 80% 75%, rgba(94,103,234,0.08) 0%, transparent 44%);
    }
    .wrap {
      position: relative; z-index: 1; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .brand {
      font-family: var(--serif); font-size: 30px; letter-spacing: -0.01em; color: var(--ink);
    }
    .dot { display: inline-block; width: 7px; height: 7px; background: var(--accent);
      border-radius: 50%; margin-left: 5px; vertical-align: middle; transform: translateY(-9px); }
    h1 {
      font-family: var(--serif); font-weight: 400; font-style: italic;
      font-size: clamp(2.4rem, 7vw, 4rem); line-height: 1.05; letter-spacing: -0.02em;
      color: var(--ink); margin: 28px 0 14px; max-width: 18ch;
    }
    h1 em { font-style: normal; color: var(--accent); }
    p { font-family: var(--sans); font-size: 16px; color: var(--muted); margin: 0; max-width: 42ch; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <div class="wrap">
    <div class="brand">Promptiv<span class="dot"></span></div>
    <h1>Being rebuilt from the <em>ground up</em>.</h1>
    <p>Something new is coming. Check back soon.</p>
  </div>
</body>
</html>
